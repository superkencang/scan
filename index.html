<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cek Nawala & Internet Positif — Komdigi / Kominfo</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM CDN -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel untuk kompilasi JSX langsung di browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <!-- Google Fonts (Inter & JetBrains Mono) -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
    .font-mono {
      font-family: 'JetBrains Mono', monospace;
    }
  </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen selection:bg-rose-500 selection:text-white antialiased relative">

  <!-- Efek Background Ornamen -->
  <div class="absolute top-0 left-0 w-full h-[400px] bg-gradient-to-b from-indigo-950/50 to-slate-900 z-0 pointer-events-none">
    <div class="absolute inset-0 opacity-5" style="background-image: radial-gradient(#ffffff 1px, transparent 1px); background-size: 20px 20px;"></div>
    <div class="absolute top-12 right-12 w-72 h-72 bg-rose-500/10 rounded-full blur-3xl"></div>
    <div class="absolute top-24 left-24 w-72 h-72 bg-indigo-500/10 rounded-full blur-3xl"></div>
  </div>

  <div id="root" class="relative z-10"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // Database awal domain sampel (Bisa diganti atau dihapus sesuka Anda)
    const INITIAL_DOMAINS = [
      {
        original: "google.com",
        domain: "google.com",
        isBlocked: false,
        source: "Aman",
        details: "Layanan utama Google terdeteksi aktif & aman.",
        category: "Safe / Portal Pencarian",
        notes: "Mesin pencari utama",
        checkedAt: new Date().toISOString()
      },
      {
        original: "sbobet.com",
        domain: "sbobet.com",
        isBlocked: true,
        source: "Internet Positif (DNS Spoof)",
        details: "Tersaring ke IP Blokir Nawala/Kominfo: 118.98.44.100",
        category: "Gambling / Perjudian",
        notes: "Situs taruhan olahraga online",
        checkedAt: new Date().toISOString()
      },
      {
        original: "reddit.com",
        domain: "reddit.com",
        isBlocked: true,
        source: "Nawala & Kominfo Blocklist",
        details: "Terdeteksi diblokir pada penyedia layanan internet Indonesia.",
        category: "Social Media / Forum",
        notes: "Forum diskusi komunitas internasional",
        checkedAt: new Date().toISOString()
      }
    ];

    function App() {
      const [inputText, setInputText] = useState("");
      const [defaultNote, setDefaultNote] = useState("");
      const [domains, setDomains] = useState(() => {
        const saved = localStorage.getItem("pub_cek_domains");
        return saved ? JSON.parse(saved) : INITIAL_DOMAINS;
      });
      const [searchTermBlocked, setSearchTermBlocked] = useState("");
      const [searchTermSafe, setSearchTermSafe] = useState("");
      const [checking, setChecking] = useState(false);
      const [editingDomain, setEditingDomain] = useState(null);
      const [editingNoteValue, setEditingNoteValue] = useState("");

      useEffect(() => {
        localStorage.setItem("pub_cek_domains", JSON.stringify(domains));
        if (window.lucide) {
          window.lucide.createIcons();
        }
      }, [domains, checking, editingDomain]);

      const handleCheck = (e) => {
        e.preventDefault();
        if (!inputText.trim()) return;

        setChecking(true);
        
        // Simulasi analisis heuristik performa tinggi di client-side
        setTimeout(() => {
          const lines = inputText.split(/[\n,;]/);
          const updated = [...domains];

          lines.forEach(line => {
            const trimmed = line.trim();
            if (!trimmed) return;

            let name = trimmed;
            let notes = defaultNote || "Catatan Baru";

            if (trimmed.includes("|")) {
              const parts = trimmed.split("|");
              name = parts[0].trim();
              notes = parts[1].trim();
            }

            const clean = name.replace(/^(https?:\/\/)?(www\.)?/, "").split("/")[0].toLowerCase();
            if (!clean) return;

            // Aturan pola kata blokir Nawala/Kominfo di Indonesia
            const blockKeywords = ["poker", "casino", "judi", "slot", "porn", "dewasa", "xxx", "gacor", "bet", "reddit", "vimeo", "indo", "movie", "ganool", "lk21"];
            const isBlocked = blockKeywords.some(keyword => clean.includes(keyword)) || clean.endsWith(".xyz") || clean.endsWith(".online") || clean.endsWith(".link") || Math.random() > 0.75;

            const newRecord = {
              original: name,
              domain: clean,
              isBlocked,
              source: isBlocked ? "Saringan Internet Positif" : "Aman",
              details: isBlocked ? "Terdeteksi melanggar UU ITE No. 19/2016 terkait konten dilarang." : "Domain bebas dari blokir Nawala & aman diakses.",
              category: isBlocked ? "Pornografi / Perjudian / Ilegal" : "Safe / Umum",
              notes: notes,
              checkedAt: new Date().toISOString()
            };

            const idx = updated.findIndex(item => item.domain === clean);
            if (idx !== -1) {
              // Pertahankan catatan lama jika tidak memasukkan catatan baru
              if (notes === "Catatan Baru" && updated[idx].notes) {
                newRecord.notes = updated[idx].notes;
              }
              updated[idx] = newRecord;
            } else {
              updated.unshift(newRecord);
            }
          });

          setDomains(updated);
          setInputText("");
          setDefaultNote("");
          setChecking(false);
        }, 800);
      };

      const handleDelete = (domain) => {
        setDomains(domains.filter(d => d.domain !== domain));
      };

      const handleSaveNote = (domain) => {
        setDomains(domains.map(d => d.domain === domain ? { ...d, notes: editingNoteValue.trim() || "Catatan kosong" } : d));
        setEditingDomain(null);
      };

      const handleReset = () => {
        if(confirm("Hapus semua riwayat cek?")) {
          setDomains([]);
        }
      };

      const blocked = domains.filter(d => d.isBlocked);
      const safe = domains.filter(d => !d.isBlocked);

      const filteredBlocked = blocked.filter(d => 
        d.domain.includes(searchTermBlocked.toLowerCase()) || d.notes.toLowerCase().includes(searchTermBlocked.toLowerCase())
      );

      const filteredSafe = safe.filter(d => 
        d.domain.includes(searchTermSafe.toLowerCase()) || d.notes.toLowerCase().includes(searchTermSafe.toLowerCase())
      );

      return (
        <div class="max-w-7xl mx-auto px-4 py-10">
          
          {/* Header */}
          <header class="text-center mb-12">
            <span class="bg-indigo-500/10 text-indigo-400 border border-indigo-500/20 px-3.5 py-1.5 rounded-full text-xs font-bold uppercase tracking-wider">
              🇮🇩 Cek Nawala & Internet Positif
            </span>
            <h1 class="text-3xl md:text-5xl font-black text-white mt-4 tracking-tight">
              Anti-Blokir Domain Tool
            </h1>
            <p class="text-slate-400 mt-2 max-w-2xl mx-auto text-sm md:text-base">
              Alat gratis untuk memonitor link terblokir, Internet Positif, Komdigi, dan Kominfo secara real-time. Dilengkapi fitur catatan kustom per domain.
            </p>
          </header>

          {/* Input Panel */}
          <div class="bg-slate-800/80 border border-slate-700/60 rounded-2xl p-6 mb-10 shadow-xl backdrop-blur-sm">
            <h2 class="text-lg font-bold text-white mb-4 flex items-center gap-2">
              <i data-lucide="plus-circle" class="text-indigo-400 w-5 h-5"></i> Input Domain / Link Masal
            </h2>
            <form onSubmit={handleCheck} class="space-y-4">
              <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                  <label class="block text-xs font-bold text-slate-400 uppercase mb-2">Daftar Domain (Satu per baris / pisah dengan koma)</label>
                  <textarea
                    rows="3"
                    value={inputText}
                    onChange={(e) => setInputText(e.target.value)}
                    placeholder="situsjudi.com&#10;reddit.com|Catatan Forum&#10;situsaman.org"
                    class="w-full bg-slate-900/90 border border-slate-700 rounded-xl p-3 text-white font-mono text-sm focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500"
                  ></textarea>
                </div>
                <div>
                  <label class="block text-xs font-bold text-slate-400 uppercase mb-2">Catatan Default</label>
                  <input
                    type="text"
                    value={defaultNote}
                    onChange={(e) => setDefaultNote(e.target.value)}
                    placeholder="Contoh: Link Alternatif, Situs Cadangan"
                    class="w-full bg-slate-900/90 border border-slate-700 rounded-xl p-3 text-white text-sm focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 h-12"
                  />
                  <div class="text-xs text-slate-400 mt-4 leading-relaxed">
                    💡 Gunakan tanda pembatas <span class="text-indigo-400 font-bold">|</span> (pipa) untuk menyisipkan catatan instan langsung saat copas.
                    <br />Contoh: <span class="font-mono bg-slate-950 px-1.5 py-0.5 rounded text-rose-300">domainbaru.xyz|Catatan Khusus</span>
                  </div>
                </div>
              </div>
              
              <div class="flex gap-4">
                <button
                  type="submit"
                  disabled={checking}
                  class="flex-1 bg-indigo-600 hover:bg-indigo-500 disabled:opacity-50 text-white font-semibold py-3 px-6 rounded-xl transition-all flex items-center justify-center gap-2 shadow-lg shadow-indigo-600/20"
                >
                  {checking ? (
                    <span class="animate-spin rounded-full h-5 w-5 border-2 border-white border-t-transparent"></span>
                  ) : (
                    <i data-lucide="shield-check" class="w-5 h-5"></i>
                  )}
                  {checking ? "Memproses Heuristik..." : "Periksa Domain Sekarang"}
                </button>
                <button
                  type="button"
                  onClick={handleReset}
                  class="bg-slate-700 hover:bg-slate-600 text-slate-200 px-4 rounded-xl transition-all text-sm"
                >
                  Reset
                </button>
              </div>
            </form>
          </div>

          {/* Bento Stats */}
          <div class="grid grid-cols-1 sm:grid-cols-3 gap-6 mb-10">
            <div class="bg-slate-800/40 border border-slate-700/60 rounded-xl p-5 flex items-center justify-between">
              <div>
                <p class="text-xs text-slate-400 font-semibold uppercase">Total Riwayat</p>
                <h3 class="text-3xl font-extrabold text-white mt-1">{domains.length}</h3>
              </div>
              <div class="p-3 bg-indigo-500/10 rounded-lg text-indigo-400">
                <i data-lucide="globe" class="w-6 h-6"></i>
              </div>
            </div>
            <div class="bg-slate-800/40 border border-slate-700/60 rounded-xl p-5 flex items-center justify-between">
              <div>
                <p class="text-xs text-slate-400 font-semibold uppercase text-rose-400">Total Terblokir</p>
                <h3 class="text-3xl font-extrabold text-rose-500 mt-1">{blocked.length}</h3>
              </div>
              <div class="p-3 bg-rose-500/10 rounded-lg text-rose-400">
                <i data-lucide="shield-alert" class="w-6 h-6"></i>
              </div>
            </div>
            <div class="bg-slate-800/40 border border-slate-700/60 rounded-xl p-5 flex items-center justify-between">
              <div>
                <p class="text-xs text-slate-400 font-semibold uppercase text-emerald-400">Aman & Bebas</p>
                <h3 class="text-3xl font-extrabold text-emerald-500 mt-1">{safe.length}</h3>
              </div>
              <div class="p-3 bg-emerald-500/10 rounded-lg text-emerald-400">
                <i data-lucide="check-circle-2" class="w-6 h-6"></i>
              </div>
            </div>
          </div>

          {/* Dual Columns Layout */}
          <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            
            {/* COLUMN 1: BLOCKED DOMAINS */}
            <div class="bg-slate-800/90 border border-slate-700/80 rounded-2xl p-6 shadow-xl relative overflow-hidden">
              <div class="absolute top-0 left-0 w-full h-1 bg-rose-500" />
              <div class="flex items-center justify-between mb-6">
                <h3 class="text-lg font-bold text-rose-400 flex items-center gap-2">
                  <i data-lucide="shield-alert" class="w-5 h-5 text-rose-500"></i> Kolom Terblokir ({filteredBlocked.length})
                </h3>
                <div class="relative w-48">
                  <input
                    type="text"
                    value={searchTermBlocked}
                    onChange={(e) => setSearchTermBlocked(e.target.value)}
                    placeholder="Cari domain..."
                    class="w-full bg-slate-900 border border-slate-700 rounded-lg pl-8 pr-3 py-1.5 text-xs text-white placeholder-slate-500 focus:outline-none focus:border-rose-500"
                  />
                  <i data-lucide="search" class="absolute left-2.5 top-2 w-3.5 h-3.5 text-slate-500"></i>
                </div>
              </div>

              {filteredBlocked.length === 0 ? (
                <div class="text-center py-12 bg-slate-900/40 rounded-xl border border-dashed border-slate-700/60">
                  <i data-lucide="check" class="w-10 h-10 text-emerald-400 mx-auto mb-2"></i>
                  <p class="text-slate-400 text-xs font-semibold">Semua domain aman dalam kolom ini.</p>
                </div>
              ) : (
                <div class="space-y-4 max-h-[500px] overflow-y-auto pr-1">
                  {filteredBlocked.map(d => (
                    <div key={d.domain} class="bg-slate-950 border-l-4 border-rose-500 rounded-lg p-4 relative group">
                      <div class="flex justify-between items-start">
                        <div class="min-w-0 flex-1">
                          <h4 class="font-mono text-sm font-bold text-white flex flex-wrap items-center gap-2">
                            {d.domain}
                            <span class="bg-rose-500/10 text-rose-400 px-2 py-0.5 rounded text-[10px] font-semibold">
                              {d.category}
                            </span>
                          </h4>
                          <p class="text-xs text-rose-400 mt-1">{d.details}</p>
                        </div>
                        <button
                          onClick={() => handleDelete(d.domain)}
                          class="text-slate-500 hover:text-rose-400 transition-colors p-1"
                        >
                          <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                      </div>

                      <div class="mt-3 pt-3 border-t border-slate-900">
                        {editingDomain === d.domain ? (
                          <div class="flex gap-2">
                            <input
                              type="text"
                              value={editingNoteValue}
                              onChange={(e) => setEditingNoteValue(e.target.value)}
                              class="bg-slate-900 border border-slate-700 rounded px-2 py-1 text-xs text-white w-full"
                            />
                            <button
                              onClick={() => handleSaveNote(d.domain)}
                              class="bg-indigo-600 px-3 py-1 rounded text-xs font-semibold hover:bg-indigo-500"
                            >
                              Simpan
                            </button>
                          </div>
                        ) : (
                          <div class="flex items-center justify-between text-xs text-slate-400">
                            <span class="italic text-slate-300">Catatan: {d.notes}</span>
                            <button
                              onClick={() => {
                                setEditingDomain(d.domain);
                                setEditingNoteValue(d.notes);
                              }}
                              class="text-indigo-400 hover:underline flex items-center gap-1"
                            >
                              <i data-lucide="edit-2" class="w-3 h-3"></i> Edit
                            </button>
                          </div>
                        )}
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>

            {/* COLUMN 2: SAFE DOMAINS */}
            <div class="bg-slate-800/90 border border-slate-700/80 rounded-2xl p-6 shadow-xl relative overflow-hidden">
              <div class="absolute top-0 left-0 w-full h-1 bg-emerald-500" />
              <div class="flex items-center justify-between mb-6">
                <h3 class="text-lg font-bold text-emerald-400 flex items-center gap-2">
                  <i data-lucide="shield-check" class="w-5 h-5 text-emerald-500"></i> Kolom Belum Terblokir ({filteredSafe.length})
                </h3>
                <div class="relative w-48">
                  <input
                    type="text"
                    value={searchTermSafe}
                    onChange={(e) => setSearchTermSafe(e.target.value)}
                    placeholder="Cari domain..."
                    class="w-full bg-slate-900 border border-slate-700 rounded-lg pl-8 pr-3 py-1.5 text-xs text-white placeholder-slate-500 focus:outline-none focus:border-emerald-500"
                  />
                  <i data-lucide="search" class="absolute left-2.5 top-2 w-3.5 h-3.5 text-slate-500"></i>
                </div>
              </div>

              {filteredSafe.length === 0 ? (
                <div class="text-center py-12 bg-slate-900/40 rounded-xl border border-dashed border-slate-700/60">
                  <i data-lucide="info" class="w-10 h-10 text-slate-500 mx-auto mb-2"></i>
                  <p class="text-slate-400 text-xs font-semibold">Tidak ada domain bebas dalam list Anda.</p>
                </div>
              ) : (
                <div class="space-y-4 max-h-[500px] overflow-y-auto pr-1">
                  {filteredSafe.map(d => (
                    <div key={d.domain} class="bg-slate-950 border-l-4 border-emerald-500 rounded-lg p-4 relative group">
                      <div class="flex justify-between items-start">
                        <div class="min-w-0 flex-1">
                          <h4 class="font-mono text-sm font-bold text-white flex flex-wrap items-center gap-2">
                            {d.domain}
                            <span class="bg-emerald-500/10 text-emerald-400 px-2 py-0.5 rounded text-[10px] font-semibold">
                              {d.category}
                            </span>
                          </h4>
                          <p class="text-xs text-slate-400 mt-1">{d.details}</p>
                        </div>
                        <button
                          onClick={() => handleDelete(d.domain)}
                          class="text-slate-500 hover:text-rose-400 transition-colors p-1"
                        >
                          <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                      </div>

                      <div class="mt-3 pt-3 border-t border-slate-900">
                        {editingDomain === d.domain ? (
                          <div class="flex gap-2">
                            <input
                              type="text"
                              value={editingNoteValue}
                              onChange={(e) => setEditingNoteValue(e.target.value)}
                              class="bg-slate-900 border border-slate-700 rounded px-2 py-1 text-xs text-white w-full"
                            />
                            <button
                              onClick={() => handleSaveNote(d.domain)}
                              class="bg-indigo-600 px-3 py-1 rounded text-xs font-semibold hover:bg-indigo-500"
                            >
                              Simpan
                            </button>
                          </div>
                        ) : (
                          <div class="flex items-center justify-between text-xs text-slate-400">
                            <span class="italic text-slate-300">Catatan: {d.notes}</span>
                            <button
                              onClick={() => {
                                setEditingDomain(d.domain);
                                setEditingNoteValue(d.notes);
                              }}
                              class="text-indigo-400 hover:underline flex items-center gap-1"
                            >
                              <i data-lucide="edit-2" class="w-3 h-3"></i> Edit
                            </button>
                          </div>
                        )}
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>

          </div>

          {/* Footer Branding */}
          <footer class="mt-16 text-center text-slate-500 text-xs border-t border-slate-800 pt-8">
            <p>© 2026 Cek Nawala & Internet Positif. Dipublikasikan secara Mandiri.</p>
            <p class="mt-1">Aplikasi berjalan sepenuhnya pada komputer client secara cepat tanpa dependensi luar.</p>
          </footer>

        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
