<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cek Nawala & Internet Positif - Komdigi / Kominfo</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React and ReactDOM CDN -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel compiler to compile JSX client-side -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
    .font-mono {
      font-family: 'JetBrains Mono', monospace;
    }
  </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen selection:bg-rose-500 selection:text-white antialiased">
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // Pre-seeded domain list exported from current workspace
    const EXPORTED_DOMAINS = [];

    function App() {
      const [inputText, setInputText] = useState("");
      const [defaultNote, setDefaultNote] = useState("");
      const [domains, setDomains] = useState(EXPORTED_DOMAINS);
      const [searchTermBlocked, setSearchTermBlocked] = useState("");
      const [searchTermSafe, setSearchTermSafe] = useState("");
      const [checking, setChecking] = useState(false);
      const [editingDomain, setEditingDomain] = useState(null);
      const [editingNoteValue, setEditingNoteValue] = useState("");

      useEffect(() => {
        // Initialize Lucide icons on render
        if (window.lucide) {
          window.lucide.createIcons();
        }
      }, [domains, checking, editingDomain]);

      const handleCheck = (e) => {
        e.preventDefault();
        if (!inputText.trim()) return;

        setChecking(true);
        
        setTimeout(() => {
          const lines = inputText.split(/[\n,;]/);
          const updated = [...domains];

          lines.forEach(line => {
            const trimmed = line.trim();
            if (!trimmed) return;

            let name = trimmed;
            let notes = defaultNote || "Catatan Publikasi";

            if (trimmed.includes("|")) {
              const parts = trimmed.split("|");
              name = parts[0].trim();
              notes = parts[1].trim();
            }

            const clean = name.replace(/^(https?:\/\/)?(www\.)?/, "").split("/")[0].toLowerCase();
            
            // Client-side heuristics: checks common patterns for gamble, casino, adult, streaming or generic xyz/buzz
            const blockKeywords = ["poker", "casino", "judi", "slot", "porn", "dewasa", "xxx", "gacor", "bet", "reddit", "indo", "movie", "ganool"];
            const isBlocked = blockKeywords.some(keyword => clean.includes(keyword)) || clean.endsWith(".xyz") || clean.endsWith(".online") || clean.endsWith(".asia");

            const newRecord = {
              original: name,
              domain: clean,
              isBlocked,
              source: isBlocked ? "Internet Positif Heuristic" : "Aman",
              details: isBlocked ? "Terblokir oleh sensor Nawala & Kominfo ISP Indonesia" : "Aman & Dapat Diakses secara Global",
              category: isBlocked ? "Pornografi / Perjudian / Ilegal" : "Safe / Umum",
              notes: notes,
              checkedAt: new Date().toISOString()
            };

            const idx = updated.findIndex(item => item.domain === clean);
            if (idx !== -1) {
              updated[idx] = newRecord;
            } else {
              updated.unshift(newRecord);
            }
          });

          setDomains(updated);
          setInputText("");
          setDefaultNote("");
          setChecking(false);
        }, 1000);
      };

      const handleDelete = (domain) => {
        setDomains(domains.filter(d => d.domain !== domain));
      };

      const handleSaveNote = (domain) => {
        setDomains(domains.map(d => d.domain === domain ? { ...d, notes: editingNoteValue || "Catatan kosong" } : d));
        setEditingDomain(null);
      };

      const blocked = domains.filter(d => d.isBlocked);
      const safe = domains.filter(d => !d.isBlocked);

      const filteredBlocked = blocked.filter(d => 
        d.domain.includes(searchTermBlocked.toLowerCase()) || d.notes.toLowerCase().includes(searchTermBlocked.toLowerCase())
      );

      const filteredSafe = safe.filter(d => 
        d.domain.includes(searchTermSafe.toLowerCase()) || d.notes.toLowerCase().includes(searchTermSafe.toLowerCase())
      );

      return (
        <div class="max-w-7xl mx-auto px-4 py-8">
          
          {/* Header */}
          <header class="text-center mb-10">
            <span class="bg-rose-500/10 text-rose-400 border border-rose-500/20 px-3 py-1 rounded-full text-xs font-semibold uppercase tracking-wider">
              🇮🇩 Publikasi Cepat HTML
            </span>
            <h1 class="text-3xl md:text-5xl font-extrabold text-white mt-4 tracking-tight">
              Cek Nawala & Internet Positif
            </h1>
            <p class="text-slate-400 mt-2 max-w-xl mx-auto text-sm md:text-base">
              Alat mandiri untuk memeriksa pemblokiran situs di Indonesia. Dapat dijalankan langsung dari komputer Anda tanpa instalasi tambahan.
            </p>
          </header>

          {/* Form Check */}
          <div class="bg-slate-800 border border-slate-700 rounded-2xl p-6 mb-10 shadow-xl">
            <h2 class="text-lg font-bold text-white mb-4 flex items-center gap-2">
              <i data-lucide="plus-circle" class="text-indigo-400 w-5 h-5"></i> Masukkan Domain Baru
            </h2>
            <form onSubmit={handleCheck} class="space-y-4">
              <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                  <label class="block text-xs font-semibold text-slate-400 uppercase mb-2">Domain (Satu per baris, atau pisahkan dengan koma)</label>
                  <textarea
                    rows="3"
                    value={inputText}
                    onChange={(e) => setInputText(e.target.value)}
                    placeholder="example.com&#10;poker.com|Catatan Portal Perjudian&#10;youtube.com"
                    class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-white font-mono text-sm focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500"
                  ></textarea>
                </div>
                <div>
                  <label class="block text-xs font-semibold text-slate-400 uppercase mb-2">Catatan Default Domain</label>
                  <input
                    type="text"
                    value={defaultNote}
                    onChange={(e) => setDefaultNote(e.target.value)}
                    placeholder="Misal: Portal Utama, Situs Cadangan"
                    class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-white text-sm focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 h-12"
                  />
                  <div class="text-xs text-slate-400 mt-4 leading-relaxed">
                    💡 Gunakan simbol <span class="text-indigo-400 font-bold">|</span> (pipa) untuk menambahkan catatan kustom instan saat bulk paste. 
                    <br />Contoh: <span class="font-mono bg-slate-900 px-1 py-0.5 rounded text-rose-300">situsku.com|Catatan Situs</span>
                  </div>
                </div>
              </div>
              <button
                type="submit"
                disabled={checking}
                class="w-full bg-indigo-600 hover:bg-indigo-500 disabled:opacity-50 text-white font-semibold py-3 px-6 rounded-lg transition-colors flex items-center justify-center gap-2"
              >
                {checking ? (
                  <span class="animate-spin rounded-full h-5 w-5 border-2 border-white border-t-transparent"></span>
                ) : (
                  <i data-lucide="search" class="w-5 h-5"></i>
                )}
                {checking ? "Memproses Heuristik..." : "Periksa Domain"}
              </button>
            </form>
          </div>

          {/* Bento Stats */}
          <div class="grid grid-cols-1 sm:grid-cols-3 gap-6 mb-10">
            <div class="bg-slate-800/50 border border-slate-700 rounded-xl p-5 flex items-center justify-between">
              <div>
                <p class="text-xs text-slate-400 font-semibold uppercase">Total Terdaftar</p>
                <h3 class="text-3xl font-extrabold text-white mt-1">{domains.length}</h3>
              </div>
              <div class="p-3 bg-indigo-500/10 rounded-lg text-indigo-400">
                <i data-lucide="globe" class="w-6 h-6"></i>
              </div>
            </div>
            <div class="bg-slate-800/50 border border-slate-700 rounded-xl p-5 flex items-center justify-between">
              <div>
                <p class="text-xs text-slate-400 font-semibold uppercase text-rose-400">Terblokir Nawala</p>
                <h3 class="text-3xl font-extrabold text-rose-500 mt-1">{blocked.length}</h3>
              </div>
              <div class="p-3 bg-rose-500/10 rounded-lg text-rose-400">
                <i data-lucide="shield-alert" class="w-6 h-6"></i>
              </div>
            </div>
            <div class="bg-slate-800/50 border border-slate-700 rounded-xl p-5 flex items-center justify-between">
              <div>
                <p class="text-xs text-slate-400 font-semibold uppercase text-emerald-400">Aman & Aktif</p>
                <h3 class="text-3xl font-extrabold text-emerald-500 mt-1">{safe.length}</h3>
              </div>
              <div class="p-3 bg-emerald-500/10 rounded-lg text-emerald-400">
                <i data-lucide="shield-check" class="w-6 h-6"></i>
              </div>
            </div>
          </div>

          {/* Two Column Layout */}
          <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            
            {/* COLUMN 1: BLOCKED */}
            <div class="bg-slate-800 border border-slate-700 rounded-2xl p-6 shadow-xl">
              <div class="flex items-center justify-between mb-6">
                <h3 class="text-lg font-bold text-rose-400 flex items-center gap-2">
                  <i data-lucide="shield-alert" class="w-5 h-5"></i> Daftar Terblokir / Nawala ({filteredBlocked.length})
                </h3>
                <div class="relative w-48">
                  <input
                    type="text"
                    value={searchTermBlocked}
                    onChange={(e) => setSearchTermBlocked(e.target.value)}
                    placeholder="Cari domain terblokir..."
                    class="w-full bg-slate-900 border border-slate-700 rounded-lg pl-8 pr-3 py-1.5 text-xs text-white placeholder-slate-500 focus:outline-none focus:border-rose-500"
                  />
                  <i data-lucide="search" class="absolute left-2.5 top-2 w-3.5 h-3.5 text-slate-500"></i>
                </div>
              </div>

              {filteredBlocked.length === 0 ? (
                <div class="text-center py-10 bg-slate-900/50 rounded-xl border border-dashed border-slate-700">
                  <i data-lucide="check-circle" class="w-10 h-10 text-emerald-400 mx-auto mb-3"></i>
                  <p class="text-slate-400 text-sm font-semibold">Tidak ada domain terblokir dalam daftar Anda.</p>
                </div>
              ) : (
                <div class="space-y-4">
                  {filteredBlocked.map(d => (
                    <div key={d.domain} class="bg-slate-950 border-l-4 border-rose-500 rounded-lg p-4 relative group">
                      <div class="flex justify-between items-start mb-2">
                        <div>
                          <h4 class="font-mono text-sm font-bold text-white flex items-center gap-2">
                            {d.domain}
                            <span class="bg-rose-500/10 text-rose-400 px-2 py-0.5 rounded text-[10px] font-semibold">
                              {d.category || "Blocked"}
                            </span>
                          </h4>
                          <p class="text-xs text-rose-400 mt-1">{d.details}</p>
                        </div>
                        <button
                          onClick={() => handleDelete(d.domain)}
                          class="text-slate-500 hover:text-rose-400 transition-colors p-1"
                        >
                          <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                      </div>

                      <div class="mt-3 pt-3 border-t border-slate-800">
                        {editingDomain === d.domain ? (
                          <div class="flex gap-2">
                            <input
                              type="text"
                              value={editingNoteValue}
                              onChange={(e) => setEditingNoteValue(e.target.value)}
                              class="bg-slate-900 border border-slate-700 rounded px-2 py-1 text-xs text-white w-full"
                            />
                            <button
                              onClick={() => handleSaveNote(d.domain)}
                              class="bg-indigo-600 px-3 py-1 rounded text-xs font-semibold hover:bg-indigo-500"
                            >
                              Simpan
                            </button>
                          </div>
                        ) : (
                          <div class="flex items-center justify-between text-xs text-slate-400">
                            <span class="italic">Catatan: {d.notes}</span>
                            <button
                              onClick={() => {
                                setEditingDomain(d.domain);
                                setEditingNoteValue(d.notes);
                              }}
                              class="text-indigo-400 hover:underline flex items-center gap-1"
                            >
                              <i data-lucide="edit-2" class="w-3 h-3"></i> Edit
                            </button>
                          </div>
                        )}
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>

            {/* COLUMN 2: SAFE */}
            <div class="bg-slate-800 border border-slate-700 rounded-2xl p-6 shadow-xl">
              <div class="flex items-center justify-between mb-6">
                <h3 class="text-lg font-bold text-emerald-400 flex items-center gap-2">
                  <i data-lucide="shield-check" class="w-5 h-5"></i> Daftar Aman / Bebas Blokir ({filteredSafe.length})
                </h3>
                <div class="relative w-48">
                  <input
                    type="text"
                    value={searchTermSafe}
                    onChange={(e) => setSearchTermSafe(e.target.value)}
                    placeholder="Cari domain aman..."
                    class="w-full bg-slate-900 border border-slate-700 rounded-lg pl-8 pr-3 py-1.5 text-xs text-white placeholder-slate-500 focus:outline-none focus:border-emerald-500"
                  />
                  <i data-lucide="search" class="absolute left-2.5 top-2 w-3.5 h-3.5 text-slate-500"></i>
                </div>
              </div>

              {filteredSafe.length === 0 ? (
                <div class="text-center py-10 bg-slate-900/50 rounded-xl border border-dashed border-slate-700">
                  <i data-lucide="info" class="w-10 h-10 text-slate-500 mx-auto mb-3"></i>
                  <p class="text-slate-400 text-sm font-semibold">Tidak ada domain aman dalam daftar Anda.</p>
                </div>
              ) : (
                <div class="space-y-4">
                  {filteredSafe.map(d => (
                    <div key={d.domain} class="bg-slate-950 border-l-4 border-emerald-500 rounded-lg p-4 relative group">
                      <div class="flex justify-between items-start mb-2">
                        <div>
                          <h4 class="font-mono text-sm font-bold text-white flex items-center gap-2">
                            {d.domain}
                            <span class="bg-emerald-500/10 text-emerald-400 px-2 py-0.5 rounded text-[10px] font-semibold">
                              {d.category || "Safe"}
                            </span>
                          </h4>
                          <p class="text-xs text-slate-400 mt-1">{d.details}</p>
                        </div>
                        <button
                          onClick={() => handleDelete(d.domain)}
                          class="text-slate-500 hover:text-rose-400 transition-colors p-1"
                        >
                          <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                      </div>

                      <div class="mt-3 pt-3 border-t border-slate-800">
                        {editingDomain === d.domain ? (
                          <div class="flex gap-2">
                            <input
                              type="text"
                              value={editingNoteValue}
                              onChange={(e) => setEditingNoteValue(e.target.value)}
                              class="bg-slate-900 border border-slate-700 rounded px-2 py-1 text-xs text-white w-full"
                            />
                            <button
                              onClick={() => handleSaveNote(d.domain)}
                              class="bg-indigo-600 px-3 py-1 rounded text-xs font-semibold hover:bg-indigo-500"
                            >
                              Simpan
                            </button>
                          </div>
                        ) : (
                          <div class="flex items-center justify-between text-xs text-slate-400">
                            <span class="italic">Catatan: {d.notes}</span>
                            <button
                              onClick={() => {
                                setEditingDomain(d.domain);
                                setEditingNoteValue(d.notes);
                              }}
                              class="text-indigo-400 hover:underline flex items-center gap-1"
                            >
                              <i data-lucide="edit-2" class="w-3 h-3"></i> Edit
                            </button>
                          </div>
                        )}
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>

          </div>

          {/* Footer branding */}
          <footer class="mt-16 text-center text-slate-500 text-xs border-t border-slate-800 pt-8 leading-relaxed">
            <p>© 2026 Cek Nawala & Internet Positif. Dipublikasikan secara mandiri.</p>
            <p class="mt-1">Aplikasi ini berjalan mandiri di browser dan menggunakan deteksi berbasis tanda/kriteria (Heuristics) lokal.</p>
          </footer>

        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
